<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Responsive Mobil Mağaza; HTML, Tailwind CSS ve Vanilla JavaScript ile geliştirilmiş, sayfa yenilenmeden çalışan mobil-first bir e-ticaret prototipidir."
    />
    <meta
      name="keywords"
      content="responsive mobil mağaza, tailwind css, vanilla javascript, ürün listesi, sepet, ürün detayı, mobile ui"
    />
    <meta name="theme-color" content="#09090f" />
    <title>Responsive Mobil Magaza</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
      tailwind.config = {
        theme: {
          extend: {
            colors: {
              night: '#09090f',
              ink: '#111827',
              panel: '#15192b',
              panelsoft: '#1d2338',
              violetbrand: '#8b5cf6',
              cyanbrand: '#22d3ee',
              rosebrand: '#fb7185',
            },
            boxShadow: {
              card: '0 25px 70px rgba(2, 8, 23, 0.35)',
            },
          },
        },
      }
    </script>
    <link rel="preconnect" href="https://images.unsplash.com" />
    <link rel="stylesheet" href="/styles.css" />
  </head>
  <body class="bg-night text-slate-100">
    <a class="skip-link" href="#app-view">İçeriğe geç</a>

    <div class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(139,92,246,0.22),_transparent_30%),linear-gradient(180deg,#09090f_0%,#0f172a_45%,#111827_100%)]">
      <header class="app-header">
        <div class="app-frame">
          <div class="app-header__inner">
            <a href="#home" class="brand-link" aria-label="Ana sayfaya don">
              <span class="brand-mark">RM</span>
              <span>
                <strong>Responsive Mobil Mağaza</strong>
                <small>Mobil-first teknoloji vitrini</small>
              </span>
            </a>

            <div class="header-actions">
              <button
                type="button"
                class="icon-button icon-button--ghost"
                data-route="home"
                aria-label="Ana sayfaya git"
              >
                <i data-lucide="sparkles"></i>
              </button>
              <button
                type="button"
                class="icon-button"
                data-route="search"
                aria-label="Arama sayfasına git"
              >
                <i data-lucide="search"></i>
              </button>

              <button
                type="button"
                class="icon-button icon-button--cart"
                data-route="cart"
                aria-label="Sepet sayfasına git"
              >
                <i data-lucide="shopping-bag"></i>
                <span id="header-cart-badge" class="cart-badge">0</span>
              </button>
            </div>
          </div>
        </div>
      </header>

      <main id="app-view" class="app-frame app-view" aria-live="polite"></main>

      <footer class="app-frame app-footer">
        Responsive Mobil Mağaza - <span id="current-year"></span>
      </footer>

      <nav class="bottom-nav" aria-label="Alt gezinme">
        <button type="button" class="bottom-nav__item is-current" data-route="home" aria-label="Ana sayfa">
          <i data-lucide="house"></i>
          <span>Home</span>
        </button>
        <button type="button" class="bottom-nav__item" data-route="search" aria-label="Arama sayfası">
          <i data-lucide="search"></i>
          <span>Search</span>
        </button>
        <button type="button" class="bottom-nav__item" data-route="cart" aria-label="Sepet sayfası">
          <i data-lucide="shopping-cart"></i>
          <span>Cart</span>
          <span id="nav-cart-badge" class="bottom-nav__badge">0</span>
        </button>
        <button type="button" class="bottom-nav__item" data-route="profile" aria-label="Profil sayfası">
          <i data-lucide="user-round"></i>
          <span>Profile</span>
        </button>
      </nav>
    </div>

    <script type="module" src="/app.js"></script>
  </body>
</html>
