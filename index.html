<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      name="description"
      content="Responsive Mobil Mağaza; HTML5, Tailwind CSS ve Vanilla JavaScript ile geliştirilmiş, Netlify uyumlu, yüksek Lighthouse hedefli mobil-first e-ticaret prototipidir."
    />
    <meta
      name="keywords"
      content="responsive mobil mağaza, tailwind css, vanilla javascript, ürün listesi, sepet, ürün detayı, mobile ui"
    />
    <meta name="robots" content="index, follow" />
    <meta name="author" content="Responsive Mobil Mağaza Projesi" />
    <meta name="theme-color" content="#09090f" />
    <title>Responsive Mobil Mağaza | Mobil-First E-Ticaret Deneyimi</title>
    <style>
      html{scroll-behavior:smooth}body{margin:0;min-width:320px;font-family:Inter,ui-sans-serif,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:#09090f;color:#f1f5f9}.skip-link{position:absolute;left:1rem;top:1rem;z-index:40;transform:translateY(-220%);border-radius:9999px;background:#38bdf8;color:#020617;padding:.75rem 1rem;font-weight:700}.skip-link:focus{transform:translateY(0)}img{display:block;max-width:100%}.app-frame{width:min(100%,480px);margin:0 auto;padding-inline:1rem}.app-header{position:sticky;top:0;z-index:30;padding-top:.6rem}.app-header__inner{display:flex;align-items:center;justify-content:space-between;gap:1rem;border:1px solid rgb(255 255 255/.08);border-radius:20px;background:rgb(9 9 15/.78);backdrop-filter:blur(14px);padding:.78rem .88rem;box-shadow:0 8px 18px rgba(4,9,19,.14)}.brand-link{display:inline-flex;align-items:center;gap:.85rem;color:inherit;text-decoration:none}.brand-mark{display:grid;place-items:center;width:2.35rem;height:2.35rem;border-radius:14px;background:linear-gradient(135deg,#22d3ee,#8b5cf6);color:#020617;font-weight:800}.brand-link strong{display:block;font-size:.88rem;color:#fff}.brand-link small{display:block;margin-top:.15rem;color:rgb(148 163 184);font-size:.68rem}.header-actions{display:flex;align-items:center;gap:.65rem}.icon-button{position:relative;display:grid;place-items:center;width:2.55rem;height:2.55rem;border:1px solid rgb(255 255 255/.1);border-radius:16px;background:rgb(255 255 255/.04);color:rgb(241 245 249)}.icon-slot{display:inline-flex;align-items:center;justify-content:center}.icon-slot svg{width:1.05rem;height:1.05rem;stroke-width:2}.cart-badge,.bottom-nav__badge{position:absolute;top:-.2rem;right:-.15rem;min-width:1.1rem;height:1.1rem;padding-inline:.3rem;border-radius:9999px;background:#ef4444;color:#fff;font-size:.66rem;font-weight:700;display:inline-flex;align-items:center;justify-content:center}.app-view{padding-top:1rem;padding-bottom:6.4rem}.premium-card,.filter-panel,.product-card,.process-summary{border:1px solid rgb(255 255 255/.08);background:linear-gradient(180deg,rgb(18 24 43/.9),rgb(10 15 29/.96))}.premium-card,.filter-panel,.process-summary{border-radius:1.5rem}.hero-banner{position:relative;overflow:hidden}.category-scroller{scrollbar-width:none}.category-scroller::-webkit-scrollbar{display:none}.category-pill{border:1px solid rgb(255 255 255/.1);border-radius:9999px;background:rgb(255 255 255/.05);padding:.72rem 1rem;color:rgb(226 232 240);font-size:.875rem;font-weight:600}.category-pill.is-active{border-color:rgb(167 139 250/.45);background:linear-gradient(135deg,rgba(56,189,248,.95),rgba(139,92,246,.95));color:rgb(2 6 23)}.filter-panel,.process-summary,.product-grid,.process-summary-grid{display:grid;gap:1rem}.process-summary-grid{grid-template-columns:1fr}.product-grid{grid-template-columns:repeat(2,minmax(0,1fr))}.product-card{overflow:hidden;border-radius:24px}.product-card__button{display:block;width:100%;border:0;background:transparent;padding:0;text-align:left}.theme-button,.action-button{display:inline-flex;align-items:center;justify-content:center;border:1px solid rgb(139 92 246/.24);border-radius:9999px;background:linear-gradient(135deg,rgb(32 41 72),rgb(58 37 102));color:#f8fafc;padding:.72rem 1rem;font-size:.82rem;font-weight:700;transition:background 160ms ease,transform 160ms ease}.theme-button:hover,.action-button:hover{transform:translateY(-1px);background:linear-gradient(135deg,rgb(40 51 89),rgb(72 46 126))}.theme-button--wide,.theme-button--block{width:auto}.theme-button--block{width:100%}.process-summary__item{position:relative;padding-left:1.2rem}.process-summary__item::before{content:"";position:absolute;left:0;top:.45rem;width:.45rem;height:.45rem;border-radius:9999px;background:linear-gradient(135deg,#22d3ee,#8b5cf6)}.process-summary__item strong{display:block;color:#fff;font-size:.92rem}.process-summary__item span{display:block;margin-top:.24rem;color:rgb(148 163 184);font-size:.8rem;line-height:1.55}.bottom-nav{position:fixed;left:50%;bottom:1rem;z-index:35;transform:translateX(-50%);display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:.45rem;width:min(calc(100% - 1.5rem),480px);padding:.48rem;border:1px solid rgb(255 255 255/.08);border-radius:20px;background:rgb(9 9 15/.82);backdrop-filter:blur(16px);box-shadow:0 10px 22px rgba(2,8,23,.18)}.bottom-nav__item{position:relative;display:grid;place-items:center;gap:.2rem;min-height:3.15rem;border:0;border-radius:16px;background:transparent;color:rgb(148 163 184)}.bottom-nav__item.is-current{background:rgb(255 255 255/.08);color:#fff}.bottom-nav__item span{font-size:.68rem;font-weight:600}.app-footer{padding-bottom:5.8rem;text-align:center;color:rgb(100 116 139);font-size:.85rem}@media (min-width:768px){.app-frame{width:min(100%,1120px);padding-inline:1.25rem}.app-view{padding-bottom:2rem}.process-summary-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.bottom-nav{position:static;transform:none;width:min(100%,1120px);margin:0 auto 1.25rem}.app-footer{padding-bottom:1.5rem}}
    </style>
    <link rel="preload" href="./styles.css" as="style" />
    <link rel="stylesheet" href="./styles.css" media="print" onload="this.media='all'" />
    <noscript><link rel="stylesheet" href="./styles.css" /></noscript>
  </head>
  <body class="bg-night text-slate-100">
    <a class="skip-link" href="#app-view">İçeriğe geç</a>

    <div class="min-h-screen bg-[radial-gradient(circle_at_top,_rgba(139,92,246,0.22),_transparent_30%),linear-gradient(180deg,#09090f_0%,#0f172a_45%,#111827_100%)]">
      <header class="app-header" id="app-header">
        <div class="app-frame">
          <div class="app-header__inner">
            <a href="#home" class="brand-link" aria-label="Ana sayfaya don">
              <span class="brand-mark">RM</span>
              <span>
                <strong>Responsive Mobil Mağaza</strong>
                <small>Mobil-first teknoloji vitrini</small>
              </span>
            </a>

            <div class="header-actions">
              <button
                type="button"
                class="icon-button icon-button--ghost"
                data-route="home"
                aria-label="Ana sayfaya git"
              >
                <span class="icon-slot" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="m12 3 1.7 4.3L18 9l-4.3 1.7L12 15l-1.7-4.3L6 9l4.3-1.7L12 3Z" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </span>
              </button>
              <button
                type="button"
                class="icon-button"
                data-route="search"
                aria-label="Arama sayfasına git"
              >
                <span class="icon-slot" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <circle cx="11" cy="11" r="7" stroke-width="2"/>
                    <path d="m20 20-3.5-3.5" stroke-width="2" stroke-linecap="round"/>
                  </svg>
                </span>
              </button>

              <button
                type="button"
                class="icon-button icon-button--cart"
                data-route="cart"
                aria-label="Sepet sayfasına git"
              >
                <span class="icon-slot" aria-hidden="true">
                  <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
                    <path d="M6 8h12l-1 11H7L6 8Z" stroke-width="2" stroke-linejoin="round"/>
                    <path d="M9 8a3 3 0 1 1 6 0" stroke-width="2" stroke-linecap="round"/>
                  </svg>
                </span>
                <span id="header-cart-badge" class="cart-badge">0</span>
              </button>
            </div>
          </div>
        </div>
      </header>

      <main id="app-view" class="app-frame app-view" aria-live="polite"></main>

      <footer class="app-frame app-footer">
        Responsive Mobil Mağaza - <span id="current-year"></span>
      </footer>

      <nav class="bottom-nav" id="bottom-nav" aria-label="Alt gezinme">
        <button type="button" class="bottom-nav__item is-current" data-route="home" aria-label="Ana sayfa">
          <span class="icon-slot" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M3 11.5 12 4l9 7.5" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <path d="M5 10.5V20h14v-9.5" stroke-width="2" stroke-linejoin="round"/>
            </svg>
          </span>
          <span>Home</span>
        </button>
        <button type="button" class="bottom-nav__item" data-route="search" aria-label="Arama sayfası">
          <span class="icon-slot" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <circle cx="11" cy="11" r="7" stroke-width="2"/>
              <path d="m20 20-3.5-3.5" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
          <span>Search</span>
        </button>
        <button type="button" class="bottom-nav__item" data-route="cart" aria-label="Sepet sayfası">
          <span class="icon-slot" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <path d="M3 5h2l2.2 9h9.8l2-7H7.2" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
              <circle cx="10" cy="19" r="1.5" fill="currentColor" stroke="none"/>
              <circle cx="17" cy="19" r="1.5" fill="currentColor" stroke="none"/>
            </svg>
          </span>
          <span>Cart</span>
          <span id="nav-cart-badge" class="bottom-nav__badge">0</span>
        </button>
        <button type="button" class="bottom-nav__item" data-route="profile" aria-label="Profil sayfası">
          <span class="icon-slot" aria-hidden="true">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor">
              <circle cx="12" cy="8" r="4" stroke-width="2"/>
              <path d="M5 20c1.8-3 4.2-4.5 7-4.5s5.2 1.5 7 4.5" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </span>
          <span>Profile</span>
        </button>
      </nav>
    </div>

    <script type="module" defer src="./app.js"></script>
  </body>
</html>
